name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: NIRDuino-macOS
            asset_name: NIRDuino-${{ github.ref_name }}-macOS.zip

          - os: windows-latest
            artifact: NIRDuino-Windows
            asset_name: NIRDuino-${{ github.ref_name }}-Windows.zip

          - os: ubuntu-latest
            artifact: NIRDuino-Linux
            asset_name: NIRDuino-${{ github.ref_name }}-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fnirs-client/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fnirs-client/requirements.txt
          pip install pyinstaller

      # Linux needs display server for DearPyGui build
      - name: Install Linux display dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglx-mesa0 libegl1 libxrandr2 \
            libxss1 libxcursor1 libxcomposite1 libxi6 libxtst6 libx11-6

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd fnirs-client
          pyinstaller cogni-gui.spec
          cd dist
          zip -r9 ../../NIRDuino-${{ github.ref_name }}-macOS.zip NIRDuino.app

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd fnirs-client
          pyinstaller cogni-gui.spec
          Compress-Archive -Path dist\NIRDuino.exe -DestinationPath ..\NIRDuino-${{ github.ref_name }}-Windows.zip

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd fnirs-client
          pyinstaller cogni-gui.spec
          cd dist
          tar czf ../../NIRDuino-${{ github.ref_name }}-Linux.tar.gz NIRDuino

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_name }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required to read annotated tag messages

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract tag message for changelog
        id: tag
        run: |
          MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          {
            echo 'body<<EOF'
            echo "$MSG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag.outputs.body }}
          append_body: true
          generate_release_notes: true
          files: |
            NIRDuino-${{ github.ref_name }}-macOS.zip
            NIRDuino-${{ github.ref_name }}-Windows.zip
            NIRDuino-${{ github.ref_name }}-Linux.tar.gz
